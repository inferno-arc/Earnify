<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Earnify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-screen { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 30px; }
        input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none;
        }
        .error-msg { color: #ff4d4d; font-size: 0.8rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="auth-screen">
        <h1 id="app-title" style="font-size: 2.5rem;">Earnify</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Login to continue earning.</p>

        <div class="card">
            <div id="login-error" class="error-msg"></div>
            <input type="text" id="login-id" placeholder="Email or Phone Number">
            <input type="password" id="login-pass" placeholder="Password">
            
            <button class="btn-primary" onclick="handleLogin()">Login Securely</button>
        </div>

        <p style="text-align: center; color: #94a3b8;">Don't have an account? <a href="register.html" style="color: #d946ef; text-decoration: none;">Register Now</a></p>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            const errorDiv = document.getElementById('login-error');

            const users = JSON.parse(localStorage.getItem('earnify_users')) || [];
            const user = users.find(u => (u.email === id || u.phone === id) && u.pass === pass);

            if(user) {
                localStorage.setItem('earnify_session', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                errorDiv.innerText = "Invalid ID or Password!";
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
